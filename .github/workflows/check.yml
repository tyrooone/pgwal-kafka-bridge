name: Check

on:
  pull_request:
    branches: [ main ]

env:
  NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      packages: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.4.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run dev:check
